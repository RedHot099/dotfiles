# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER , B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, B, Chromium, exec, uwsm-app -- chromium
bindd = SUPER ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER , N, VS Code, exec, uwsm-app -- code
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
# bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# Override default Omarchy binding (SUPER+M = Music) with audio controls menu
unbind = SUPER, M
bindd = SUPER, M, Audio controls, exec, omarchy-launch-audio

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER , A, T3 Chat, exec, omarchy-launch-webapp "https://t3.chat"
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://calendar.google.com"
bindd = SUPER , E, Email, exec, omarchy-launch-webapp "https://mail.google.com"
bindd = SUPER , Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER ALT, T, Twitch Following Live, exec, omarchy-launch-webapp "http://pl.twitch.tv/directory/following/live"
bindd = SUPER SHIFT CTRL, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT , G, Messanger, exec, omarchy-launch-or-focus-webapp "Messanger" "https://www.facebook.com/messages"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
# bind = SUPER SHIFT, S, exec, [workspace 6] gamescope --backend sdl -W 3440 -H 1440 -r 175 --adaptive-sync --steam --force-grab-cursor -f -- steam -gamepadui

# Gaming Mode bindings - added by installation script
windowrule = float on, match:class com.omarchy.gamingmode
windowrule = size 800 600, match:class com.omarchy.gamingmode
windowrule = center on, match:class com.omarchy.gamingmode
windowrule = pin on, match:class com.omarchy.gamingmode
unbind = SUPER ALT, S
bindd = SUPER SHIFT, S, Screenshot to clipboard, exec, omarchy-cmd-screenshot smart clipboard
bindd = SUPER ALT, S, Steam Gaming Mode, exec, ghostty --class=com.omarchy.gamingmode -e /home/kuba/.local/share/steam-launcher/enter-gamesmode
bindd = SUPER SHIFT, R, Exit Gaming Mode, exec, /home/kuba/.local/share/steam-launcher/leave-gamesmode
# End Gaming Mode bindings
